# Validates and auto-merges registry publish PRs (APPS_SPEC.md §9.3).
#
# SECURITY: this runs on pull_request_target, i.e. with write permissions on
# this repo, against workflow/script code from the BASE branch. It must never
# check out or execute anything from the PR head — the PR's changed file is
# only ever read as data (via the API) and validated.
name: validate-and-merge

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Extract the package name from the PR diff so the validate job can key its
  # concurrency group on it. Structural problems are NOT rejected here — the
  # validate job re-derives everything and owns all comment/close handling.
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      name: ${{ steps.name.outputs.name }}
    steps:
      - id: name
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });
            let name = '';
            if (files.length === 1 && files[0].status === 'added') {
              const m = files[0].filename.match(/^apps\/([a-z0-9]+(?:-[a-z0-9]+)*)\.json$/);
              if (m) name = m[1];
            }
            core.setOutput('name', name);

  validate:
    needs: detect
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Two racing PRs for the same name serialize here; the loser fails the
    # name-collision check (§9.3 check 5).
    concurrency:
      group: publish-${{ needs.detect.outputs.name || format('pr-{0}', github.event.pull_request.number) }}
      cancel-in-progress: false
    steps:
      # Base branch only (the default for pull_request_target) — never the PR head.
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-save --no-audit --no-fund ajv@8 ajv-formats@3
      - uses: actions/github-script@v7
        with:
          script: |
            const validate = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/validate.cjs`);
            await validate({ github, context, core });
